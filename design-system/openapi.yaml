        '404': { $ref: '#/components/responses/404' }

  /visits/{id}/sections:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    patch:
      tags: [Clinical Visits]
      summary: Update a gated section of a visit (history → examination → investigations → plan)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVisitSectionRequest' }
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClinicalVisit' }
        '400': { $ref: '#/components/responses/400' }

  /visits/{id}/complete:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    post:
      tags: [Clinical Visits]
      summary: Mark visit as complete (all 4 sections must be done)
      responses:
        '200':
          description: Visit completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClinicalVisit' }
        '400': { $ref: '#/components/responses/400' }

  # ── STAGING ───────────────────────────
