    post:
      tags: [Treatment Plans]
      summary: Create a treatment plan for a patient
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePlanRequest' }
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentPlan' }

  /plans/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Treatment Plans]
      summary: Get treatment plan by ID
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentPlan' }
        '404': { $ref: '#/components/responses/404' }
    put:
      tags: [Treatment Plans]
      summary: Update treatment plan
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePlanRequest' }
      responses:
        '200':
          description: Updated plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentPlan' }

  /plans/{id}/status:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    patch:
      tags: [Treatment Plans]
      summary: Update plan status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/PlanStatus' }
