        '200':
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentPlan' }

  # ── TREATMENT DELIVERY ────────────────
  /plans/{id}/deliveries:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Treatment Delivery]
      summary: List delivery sessions for a plan
      responses:
        '200':
          description: Delivery list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/TreatmentDelivery' } }
    post:
      tags: [Treatment Delivery]
      summary: Schedule a delivery session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDeliveryRequest' }
      responses:
        '201':
          description: Delivery scheduled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentDelivery' }

  /deliveries/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Treatment Delivery]
      summary: Get delivery session by ID
      responses:
        '200':
          description: Delivery detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentDelivery' }
    put:
      tags: [Treatment Delivery]
      summary: Update delivery record (administer / record adverse event)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDeliveryRequest' }
      responses:
        '200':
          description: Delivery updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentDelivery' }

  /deliveries/{id}/administer:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    post:
      tags: [Treatment Delivery]
      summary: Mark a delivery as administered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [administeredAt]
              properties:
                administeredAt:  { $ref: '#/components/schemas/Timestamp' }
                adverseEvents:   { type: array, items: { type: string } }
                notes:           { type: string }
      responses:
        '200':
          description: Delivery administered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TreatmentDelivery' }

  # ── OUTCOMES ──────────────────────────
  /patients/{id}/outcomes:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Outcomes]
      summary: List outcome assessments for a patient
      responses:
        '200':
          description: Outcome list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Outcome' } }
