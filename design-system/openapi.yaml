        - name: patientId
          in: query
          schema: { $ref: '#/components/schemas/UUID' }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/VisitStatus' }
      responses:
        '200':
          description: Visit list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/ClinicalVisit' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

    post:
      tags: [Clinical Visits]
      summary: Open a new clinical visit
      parameters:
        - $ref: '#/components/parameters/CenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVisitRequest' }
      responses:
        '201':
          description: Visit created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClinicalVisit' }

  /visits/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Clinical Visits]
      summary: Get visit by ID
      responses:
        '200':
          description: Visit detail
          content:
