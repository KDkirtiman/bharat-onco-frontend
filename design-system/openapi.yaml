    post:
      tags: [Patients]
      summary: Register a new patient
      parameters:
        - $ref: '#/components/parameters/CenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePatientRequest' }
      responses:
        '201':
          description: Patient registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patient' }
