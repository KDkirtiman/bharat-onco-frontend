      tags: [Outcomes]
      summary: Record an outcome assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assessedAt, responseAssessment, findings]
              properties:
                planId:             { $ref: '#/components/schemas/UUID' }
