  /patients/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Patients]
      summary: Get patient by ID
      responses:
        '200':
          description: Patient detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patient' }
        '404': { $ref: '#/components/responses/404' }
    put:
      tags: [Patients]
      summary: Update patient details
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePatientRequest' }
      responses:
        '200':
          description: Updated patient
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patient' }
    delete:
      tags: [Patients]
      summary: Soft-delete patient
      responses:
        '204': { description: Patient deactivated }

  # ── APPOINTMENTS ──────────────────────
  /appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      parameters:
        - $ref: '#/components/parameters/CenterId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: date
          in: query
          schema: { $ref: '#/components/schemas/Date' }
          description: Filter by appointment date
        - name: doctorId
          in: query
          schema: { $ref: '#/components/schemas/UUID' }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/AppointmentStatus' }
      responses:
        '200':
          description: Appointment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Appointment' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

    post:
      tags: [Appointments]
      summary: Book an appointment
      parameters:
        - $ref: '#/components/parameters/CenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAppointmentRequest' }
      responses:
        '201':
          description: Appointment booked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }

  /appointments/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Appointments]
      summary: Get appointment by ID
      responses:
        '200':
          description: Appointment detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
        '404': { $ref: '#/components/responses/404' }
    put:
      tags: [Appointments]
      summary: Update appointment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAppointmentRequest' }
      responses:
        '200':
          description: Updated appointment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }
    delete:
      tags: [Appointments]
      summary: Cancel appointment
      responses:
        '204': { description: Appointment cancelled }

  /appointments/{id}/status:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    patch:
      tags: [Appointments]
      summary: Update appointment status
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAppointmentStatusRequest' }
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Appointment' }

  # ── VITALS ────────────────────────────
  /patients/{id}/vitals:
    parameters:
