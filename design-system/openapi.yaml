          content:
            application/json:
              schema: { $ref: '#/components/schemas/Outcome' }

  # ── BILLING ───────────────────────────
  /billing:
    get:
      tags: [Billing]
      summary: List bills
      parameters:
        - $ref: '#/components/parameters/CenterId'
