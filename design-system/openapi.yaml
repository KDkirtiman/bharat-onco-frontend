            application/json:
              schema: { $ref: '#/components/schemas/Vitals' }
    delete:
      tags: [Vitals]
      summary: Delete vitals record
      responses:
        '204': { description: Deleted }

  # ── CLINICAL VISITS ───────────────────
  /visits:
    get:
