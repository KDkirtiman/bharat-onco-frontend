          in: query
          schema: { $ref: '#/components/schemas/Date' }
        - name: toDate
          in: query
          schema: { $ref: '#/components/schemas/Date' }
      responses:
        '200':
          description: Bill list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Bill' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

    post:
      tags: [Billing]
      summary: Create a bill
      parameters:
        - $ref: '#/components/parameters/CenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBillRequest' }
      responses:
        '201':
          description: Bill created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bill' }

  /billing/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Billing]
      summary: Get bill by ID
      responses:
        '200':
          description: Bill detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bill' }
        '404': { $ref: '#/components/responses/404' }
    put:
      tags: [Billing]
      summary: Update bill (only in draft/pending status)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBillRequest' }
      responses:
        '200':
          description: Updated bill
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bill' }

  /billing/{id}/payments:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    post:
      tags: [Billing]
      summary: Add a payment to a bill
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddPaymentRequest' }
      responses:
        '200':
          description: Bill updated with payment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bill' }

  # ── INVENTORY ─────────────────────────
  /inventory:
    get:
      tags: [Inventory]
      summary: List inventory items
      parameters:
        - $ref: '#/components/parameters/CenterId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: category
          in: query
          schema: { $ref: '#/components/schemas/InventoryCategory' }
        - name: lowStock
          in: query
          schema: { type: boolean }
          description: Filter items at or below reorder level
      responses:
        '200':
          description: Inventory list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/InventoryItem' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

    post:
      tags: [Inventory]
      summary: Add an inventory item
      parameters:
        - $ref: '#/components/parameters/CenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryItem' }
      responses:
        '201':
          description: Item added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryItem' }

  /inventory/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Inventory]
      summary: Get inventory item by ID
      responses:
        '200':
          description: Inventory item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryItem' }
    put:
      tags: [Inventory]
      summary: Update inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryItem' }
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryItem' }

  /inventory/{id}/adjust:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    post:
      tags: [Inventory]
      summary: Adjust stock level
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StockAdjustmentRequest' }
      responses:
        '200':
          description: Stock adjusted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryItem' }

  # ── DOCUMENTS ─────────────────────────
  /documents/upload-url:
    post:
      tags: [Documents]
      summary: Generate a pre-signed S3 URL for document upload
      parameters:
        - $ref: '#/components/parameters/CenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresignedUploadUrlRequest' }
      responses:
        '200':
          description: Pre-signed URL generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresignedUploadUrlResponse' }

  /documents/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Documents]
      summary: Get document metadata
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '404': { $ref: '#/components/responses/404' }
    delete:
      tags: [Documents]
      summary: Delete a document (soft-delete + S3 removal)
      responses:
        '204': { description: Document deleted }

  /documents/{id}/download-url:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Documents]
      summary: Get a pre-signed S3 URL to download a document
      responses:
        '200':
          description: Download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl: { type: string, format: uri, description: Valid for 1 hour }
                  expiresAt:   { $ref: '#/components/schemas/Timestamp' }
        '404': { $ref: '#/components/responses/404' }

  /patients/{id}/documents:
    parameters:
      - $ref: '#/components/parameters/PathId'
      - $ref: '#/components/parameters/CenterId'
    get:
      tags: [Documents]
      summary: List all documents for a patient
      parameters:
        - name: type
          in: query
          schema: { $ref: '#/components/schemas/DocumentType' }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Document' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  # ── HEALTH CHECK ──────────────────────
  /health:
    get:
      tags: [System]
      summary: API health check
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:    { type: string, example: ok }
                  version:   { type: string, example: "1.0.0" }
                  timestamp: { $ref: '#/components/schemas/Timestamp' }
                  db:        { type: string, enum: [connected, disconnected] }
                  s3:        { type: string, enum: [reachable, unreachable] }

# ─────────────────────────────────────────
# TAGS (display order)
# ─────────────────────────────────────────
tags:
  - name: Auth
    description: Authentication & token management
  - name: System
    description: Health check & system status
  - name: Centers
    description: Oncology center management
  - name: Users
    description: Staff user management
  - name: Doctors
    description: Doctor profiles
  - name: Patients
    description: Patient registration & management
  - name: Appointments
    description: Appointment scheduling
  - name: Vitals
    description: Patient vitals recording
  - name: Clinical Visits
    description: 4-section gated clinical workflow
  - name: Staging
    description: Cancer diagnosis & staging (TNM)
  - name: Treatment Plans
    description: Chemotherapy/treatment protocol management
  - name: Treatment Delivery
    description: Treatment administration & tracking
  - name: Outcomes
    description: Response assessment & outcomes
  - name: Billing
    description: Invoice & payment management
  - name: Inventory
    description: Drug & consumable stock management
  - name: Documents
    description: Patient document management (S3 pre-signed URLs)
