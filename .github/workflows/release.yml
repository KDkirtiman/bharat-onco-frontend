name: Release Package

# Manual only. Whoever runs this picks the branch to publish from (via the
# "Run workflow" branch dropdown) — must be `master` or a `release/*` branch,
# never a feature branch, since this is the step that actually ships to npm.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (semver, no leading v — e.g. 0.1.2)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install deps from the public npm registry (registry.npmjs.org)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # The workflow input is the single source of truth for the version. Every
      # package publishes at this same version (lockstep monorepo release).
      # `npm pkg set` (unlike `npm version`) doesn't error when the version
      # is already correct.
      - run: npm pkg set version="${{ inputs.version }}"
      - run: npm run version:sync
      - run: npm run build

      # Tag the commit on the branch this workflow was run against (never a
      # feature branch, since publishing is only ever triggered manually
      # against master/release/*). This is what `action-gh-release` below
      # attaches the release to.
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      # Each bfd-* package is unscoped and public, so it publishes standalone
      # to registry.npmjs.org (not GitHub Packages, which requires
      # @owner/name scoping) — someone who only wants bfd-icons can
      # `npm install bfd-icons` without pulling in the rest of the monorepo.
      - name: Publish workspace packages to npm
        run: |
          for pkg in packages/bfd-*; do
            echo "Publishing $pkg"
            npm publish --workspace "$pkg"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # GitHub Packages requires scoped package names (@owner/name)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kdkirtiman'

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Delivery record: one GitHub Release per tag, with auto-generated
      # notes from merged PRs/commits since the previous tag.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
