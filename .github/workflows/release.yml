name: Release Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install deps from the public npm registry (registry.npmjs.org)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # The git tag is the single source of truth for the version. Every
      # package publishes at this same version (lockstep monorepo release).
      # `npm pkg set` (unlike `npm version`) doesn't error when the version
      # is already correct, so this is safe whether or not the tag's
      # version matches what's already committed in package.json.
      - run: npm pkg set version="${GITHUB_REF_NAME#v}"
      - run: npm run version:sync
      - run: npm run build

      # Each bfd-* package is unscoped and public, so it publishes standalone
      # to registry.npmjs.org (not GitHub Packages, which requires
      # @owner/name scoping) — someone who only wants bfd-icons can
      # `npm install bfd-icons` without pulling in the rest of the monorepo.
      - name: Publish workspace packages to npm
        run: |
          for pkg in packages/bfd-*; do
            echo "Publishing $pkg"
            npm publish --workspace "$pkg"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # GitHub Packages requires scoped package names (@owner/name)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kdkirtiman'

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Delivery record: one GitHub Release per tag, with auto-generated
      # notes from merged PRs/commits since the previous tag.
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
