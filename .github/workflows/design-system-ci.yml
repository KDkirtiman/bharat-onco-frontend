name: Design System CI

on:
  push:
    branches: [main, master]
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-ci.yml'
  pull_request:
    paths:
      - 'design-system/**'
      - '.github/workflows/design-system-ci.yml'

concurrency:
  group: design-system-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: design-system

jobs:
  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Storybook tests with coverage
        run: npm test -- --run --coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: design-system/coverage/
          retention-days: 14

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - run: npm ci
      - run: npm run build-storybook

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: design-system/storybook-static/
          retention-days: 7

  chromatic:
    name: Visual tests (Chromatic)
    runs-on: ubuntu-latest
    needs: build-storybook
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - run: npm ci

      - name: Publish to Chromatic
        if: ${{ secrets.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: design-system
          buildScriptName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: true

  deploy-storybook:
    name: Publish Storybook (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-storybook
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: design-system/storybook-static

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: design-system/storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
